<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta name="description" content="John Eastmond's picture collection of latter-day temples.">
    <meta name="author" content="Elbert John Eastmond">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Artifika&family=Gabriela&display=swap" rel="stylesheet">
    <script defer src="scripts/getdates.js"></script>
    <script defer src="scripts/temples.js"></script>
</head>
<body>
    <header>
        <div class="top">
            <p class="logo">Temple Album</p>
            <button id="hamburger" aria-labelledby="hamburger-label"></button>
            <div id="hamburger-label">Menu Button</div>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Home</h1>
        <section class="album">
            <figure>
                <img src="images/bangkok-temple.webp" alt="Bangkok Thailand Temple">
                <figcaption>Bangkok Thailand Temple</figcaption>
            </figure>
            <figure>
                <img src="images/halifax-temple.jpeg" alt="Halifax Nova Scotia Temple">
                <figcaption>Halifax Nova Scotia Temple</figcaption>
            </figure>
            <figure>
                <img src="images/kirtland-temple.webp" alt="Kirtland Temple">
                <figcaption>Kirtland Temple</figcaption>
            </figure>
            <figure>
                <img src="images/timpanogos-temple.jpeg" alt="Mount Timpanogos Temple">
                <figcaption>Mount Timpanogos Temple</figcaption>
            </figure>
            <figure>
                <img src="images/nauvoo-temple.webp" alt="Nauvoo Temple">
                <figcaption>Nauvoo Temple</figcaption>
            </figure>
            <figure>
                <img src="images/provo-temple.webp" alt="Provo City Center Temple">
                <figcaption>Provo City Center Temple</figcaption>
            </figure>
            <figure>
                <img src="images/rome-temple.jpeg" alt="Rome Italy Temple">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>
            <figure>
                <img src="images/salt-lake-temple.webp" alt="Salt Lake Temple">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>
            <figure>
                <img src="images/st-george-temple.jpeg" alt="St. George Utah Temple">
                <figcaption>St. George Utah Temple</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>© <span id="currentYear"></span> Elbert John Eastmond | Utah</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
