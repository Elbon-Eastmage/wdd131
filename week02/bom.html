<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Can store and display a list of favorite Book of Mormon chapters for a user.">
    <meta name="author" content="Elbert John Eastmond">
    <title>Favorite Book of Mormon Chapters</title>
    <link rel="stylesheet" href="styles/bom.css">
    <script defer src="scripts/bom.js"></script>
</head>
<body>
    <h1>📖 Book of Mormon - Top 10</h1>
    <main>
        <label for="favchap">Enter Book and Chapter: </label>
        <input type="text" id="favchap" placeholder="Alma 5">
        <p class="error-field"></p>
        <button type="submit">Add Chapter</button>
        <ul id="list"></ul>
    </main>
</body>
</html>
