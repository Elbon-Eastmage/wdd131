<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading</title>
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>
<body>
    <main>
        <h1>Lazy Loading</h1>
        <img src="images/cloud-tornado.webp" loading="lazy" width="400" height="600"
            alt="Cloud in the shape of a tornado">
        <img src="images/fire.webp" loading="lazy" width="400" height="600" alt="Red, orange, and blue fire">
        <img src="images/ice.webp" loading="lazy" width="400" height="621" alt="Icy walls">
        <img src="images/lightning.webp" loading="lazy" width="400" height="600" alt="Lightning">
        <img src="images/redwood-forest.webp" loading="lazy" width="400" height="711" alt="Redwood forest">
        <img src="images/waterfall.webp" loading="lazy" width="400" height="600" alt="Waterfall">
    </main>
    <footer>
        <p>© <span id="currentYear"></span> Elbert John Eastmond | Utah</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
