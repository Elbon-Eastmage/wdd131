<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="styles/table.css">
</head>
<body>
    <table>
        <caption>Table 1: Account Feature Comparison</caption>
        <thead>
            <tr>
                <th class="top" colspan="4">ACME Wildwest Services</th>
            </tr>
            <tr>
                <td class="top"></td>
                <th class="column-header" scope="col">Basic</th>
                <th class="column-header" scope="col">Premium</th>
                <th class="column-header" scope="col">Deluxe</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th class="row-header" scope="row">Feature 1</th>
                <td>✔️</td>
                <td>✔️</td>
                <td>✔️</td>
            </tr>
            <tr>
                <th class="row-header" scope="row">Feature 2</th>
                <td>❌</td>
                <td>✔️</td>
                <td>✔️</td>
            </tr>
            <tr>
                <th class="row-header" scope="row">Feature 3</th>
                <td>❌</td>
                <td>❌</td>
                <td>✔️</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
